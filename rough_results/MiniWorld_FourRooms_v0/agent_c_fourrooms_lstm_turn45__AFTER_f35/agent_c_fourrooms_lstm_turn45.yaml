# Agent C (Active Gating) — FourRooms LSTM with 45° turn step.
# Same training hyperparameters as agent_a_fourrooms_lstm_turn45.yaml.
# Observation regime: stroboscopic ~5 Hz by default; STOP_AND_LOOK action
# triggers 35 Hz fresh observations for high_freq_steps=35 steps (1 s).
# Action space: Discrete(4) — turn_left, turn_right, move_forward, STOP_AND_LOOK.
exp_name: agent_c_fourrooms_lstm_turn45
seed: 42

env_id: MiniWorld-FourRooms-v0

total_timesteps: 3000000
num_envs: 16
num_steps: 256
learning_rate: 2.5e-4
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 4
clip_coef: 0.2
ent_coef: 0.005
vf_coef: 0.5
max_grad_norm: 0.5

recurrent: true
frame_stack: 1
lstm_hidden_size: 256
lstm_num_layers: 1

# Observation regime: Agent C — active gating (5 Hz default + STOP_AND_LOOK → 35 Hz).
use_stroboscopic: false
use_active_gating: true
strobe_k: 7         # hold length for default 5 Hz mode (7 steps at 35 Hz physics tick)
high_freq_steps: 35 # fresh-frame steps granted after STOP_AND_LOOK (= 1 s at 35 Hz)

use_proprio: false
turn_step_deg: 45

track: false
wandb_project: cff-rl
log_dir: runs
checkpoint_every: 50

record_video: true
video_every: 100
