# Agent B (5 Hz stroboscopic) — FourRooms LSTM with 45° turn step.
# Same as agent_b_fourrooms_lstm.yaml + turn_step_deg: 45 + propri inputs
exp_name: agent_b_fourrooms_lstm_propio
seed: 42

env_id: MiniWorld-FourRooms-v0

total_timesteps: 3000000
num_envs: 16
num_steps: 256
learning_rate: 2.5e-4
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 4
clip_coef: 0.2
ent_coef: 0.005
vf_coef: 0.5
max_grad_norm: 0.5

recurrent: true
frame_stack: 1
lstm_hidden_size: 256
lstm_num_layers: 1

# Observation regime: Agent B holds each frame for strobe_k=7 steps (~5 Hz).
use_stroboscopic: true
use_active_gating: false
use_active_vision: false
strobe_k: 7         # hold length — actively used by StroboscopicWrapper
high_freq_steps: 35 # unused by Agent B; kept for config parity across agents

use_proprio: true
turn_step_deg: 45

track: false
wandb_project: cff-rl
log_dir: runs
checkpoint_every: 50

record_video: true
video_every: 100