# Agent B (5 Hz stroboscopic) — Regime 1 static, FourRooms (harder than OneRoom)
exp_name: agent_b_fourrooms
seed: 42

env_id: MiniWorld-FourRooms-v0

total_timesteps: 3000000
num_envs: 16
num_steps: 256
learning_rate: 2.5e-4
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 4
clip_coef: 0.2
ent_coef: 0.005
vf_coef: 0.5
max_grad_norm: 0.5

recurrent: false
frame_stack: 8
lstm_hidden_size: 256  # unused by Agent B; kept for config parity across agents
lstm_num_layers: 1     # unused by Agent B; kept for config parity across agents

# Observation regime: Agent B holds each frame for strobe_k steps.
use_stroboscopic: true
use_active_gating: false
strobe_k: 7
high_freq_steps: 35  # unused by Agent B; kept for config parity across agents

use_proprio: false
turn_step_deg: 90

track: false
wandb_project: cff-rl
log_dir: runs
checkpoint_every: 50

record_video: true
video_every: 100
