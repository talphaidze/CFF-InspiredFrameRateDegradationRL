# Agent A — FourRooms LSTM with 10° turn step (action-space ablation).
# Same as agent_a_fourrooms_lstm.yaml + turn_step_deg: 10.
exp_name: agent_a_fourroomshard_baseline_45
seed: 42

env_id: MiniWorld-FourRoomsHard-v0

total_timesteps: 3000000
num_envs: 16
num_steps: 256
learning_rate: 2.5e-4
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 4
clip_coef: 0.2
ent_coef: 0.005
vf_coef: 0.5
max_grad_norm: 0.5

recurrent: true
frame_stack: 1
lstm_hidden_size: 256
lstm_num_layers: 1

# Observation regime: Agent A samples every frame at 35 Hz (no frame-hold).
use_stroboscopic: false
use_active_gating: false
strobe_k: 7          # unused by Agent A; kept for config parity across agents
high_freq_steps: 35  # unused by Agent A; kept for config parity across agents
action_preset: "baseline_45"

use_proprio: false

track: false
wandb_project: cff-rl
log_dir: runs/fourroomshard_baseline_45
checkpoint_every: 500

record_video: false
video_every: 100
