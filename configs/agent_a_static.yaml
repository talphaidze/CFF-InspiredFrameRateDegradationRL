# Agent A (35 Hz baseline) — Regime 1 static MiniWorld
exp_name: agent_a_static
seed: 42

env_id: MiniWorld-OneRoom-v0

total_timesteps: 1000000
num_envs: 8
num_steps: 128
learning_rate: 2.5e-4
