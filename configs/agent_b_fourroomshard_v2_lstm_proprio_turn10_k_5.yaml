# Agent B (5 Hz stroboscopic) — FourRoomsHard v2 LSTM + proprio + 10deg, k=5, 6M steps.
exp_name: agent_b_fourroomshard_v2_lstm_proprio_turn10_k_5
seed: 42

env_id: MiniWorld-FourRoomsHard-v0

total_timesteps: 6000000
num_envs: 16
num_steps: 256
learning_rate: 2.5e-4
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 4
clip_coef: 0.2
ent_coef: 0.005
vf_coef: 0.5
max_grad_norm: 0.5

recurrent: true
frame_stack: 1
lstm_hidden_size: 256
lstm_num_layers: 1

use_stroboscopic: true
use_active_gating: false
use_active_vision: false
strobe_k: 5
high_freq_steps: 35

use_proprio: true
turn_step_deg: 10

track: false
wandb_project: cff-rl
log_dir: runs
checkpoint_every: 500

record_video: true
video_every: 100
