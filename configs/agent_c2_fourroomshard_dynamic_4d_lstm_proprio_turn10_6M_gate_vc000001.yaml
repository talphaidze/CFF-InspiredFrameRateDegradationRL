# Agent C v2 + gate — FourRoomsHardDynamic, 6M steps, vision_cost=0.00001 (fixed).
# Phase 1 (0–2M):  gate_alpha=0, ent_coef=0.02
# Phase 2 (2M–6M): gate_alpha 0→1, ent_coef 0.02→0.001
exp_name: agent_c2_fourroomshard_dynamic_4d_lstm_proprio_turn10_6M_gate_vc000001
seed: 42

env_id: MiniWorld-FourRoomsHardDynamic-v0

total_timesteps: 6000000
num_envs: 16
num_steps: 256
learning_rate: 2.5e-4
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 4
clip_coef: 0.2
ent_coef: 0.001
ent_coef_phase1: 0.02
vf_coef: 0.5
max_grad_norm: 0.5

recurrent: true
frame_stack: 1
lstm_hidden_size: 256
lstm_num_layers: 1

use_stroboscopic: false
use_active_gating: false
use_active_vision: true
vision_cost: 0.00001
strobe_k: 7
hf_strobe_k: 1
high_freq_steps: 35

use_fresh_gate: true
gate_warmup_start: 2000000
gate_warmup_end: 6000000

use_proprio: true
turn_step_deg: 10

track: false
wandb_project: cff-rl
log_dir: runs
checkpoint_every: 50

record_video: true
video_every: 100
